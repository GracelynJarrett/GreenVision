# GreenVision configuration
#
# This file stores shared defaults used by train.py, tune.py, and validate.py.
# Keep ImageNet normalization values unchanged so the pretrained EfficientNet
# backbone sees the same input distribution during training and inference.

project:
  name: GreenVision
  seed: 42
  image_size: 224
  num_classes: 38

paths:
  data_dir: data
  model_dir: models
  checkpoint_best: models/best_model.pth
  checkpoint_phase1: models/phase1_best.pth
  class_to_idx: models/class_to_idx.json
  idx_to_class: models/idx_to_class.json
  logs_dir: logs
  mlflow_artifacts_dir: mlruns

mlflow:
  experiment_name: GreenVision
  tracking_uri: null
  ui_port: 5000
  run_name_phase1: phase1_feature_extraction
  run_name_tuning_prefix: phase2_tuning
  log_system_metrics: true
  nested_runs: false

model:
  backbone: efficientnet_b0
  pretrained: true
  feature_dim: 1280
  hidden_dim: 128
  dropout: 0.5

augmentation:
  train:
    random_resized_crop:
      scale: [0.8, 1.0]
    horizontal_flip_prob: 0.5
    vertical_flip_prob: 0.5
    rotation_degrees: 15
    color_jitter:
      brightness: 0.1
      contrast: 0.1
      saturation: 0.1
      hue: 0.05
  validation:
    resize: 256
    center_crop: 224
  normalization:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

splits:
  train: 0.75
  validation: 0.15
  test: 0.10
  validation_images: true

training:
  batch_size: 16
  num_workers: 0
  pin_memory: false
  phase1:
    epochs: 8
    learning_rate: 0.001
    weight_decay: 0.0001
    freeze_backbone: true

  regularization:
    dropout: 0.5
    weight_decay: 0.0001
    early_stopping_patience: 8
    early_stopping_min_delta: 0.0
  optimization:
    optimizer: adam
    scheduler: reduce_on_plateau
    scheduler_patience: 3
    scheduler_factor: 0.5

validation:
  batch_size: 16
  num_workers: 0
  pin_memory: false
  save_confusion_matrix: true
  evaluate_each_phase: true

checkpointing:
  monitor: val_loss
  mode: min
  save_best_only: true

tuning:
  enabled: true
  default_total_backbone_groups: 8
  defaults:
    epochs: 8
    batch_size: 24
    learning_rate: 0.00005
    weight_decay: 0.0001
    dropout: 0.3
    early_stopping_patience: 8
    early_stopping_min_delta: 0.0
    optimizer: adam
    warmup_epochs: 1
    min_lr_scale: 0.1
  profiles:
    M2:
      description: Unfreeze beginning groups 1-3 with conservative augmentation.
      trainable_groups: [1, 2, 3]
      epochs: 8
      batch_size: 24
      learning_rate: 0.0001
      weight_decay: 0.0001
      dropout: 0.3
      augmentation:
        train:
          random_resized_crop:
            scale: [0.9, 1.1]
          horizontal_flip_prob: 0.5
          vertical_flip_prob: 0.0
          rotation_degrees: 10
          color_jitter:
            brightness: 0.0
            contrast: 0.0
            saturation: 0.0
            hue: 0.0
        validation:
          resize: 256
          center_crop: 224
        normalization:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
    M3:
      description: Unfreeze middle groups 4-6 with balanced augmentation.
      trainable_groups: [4, 5, 6]
      epochs: 8
      batch_size: 24
      learning_rate: 0.00005
      weight_decay: 0.0001
      dropout: 0.3
      augmentation:
        train:
          random_resized_crop:
            scale: [0.8, 1.2]
          horizontal_flip_prob: 0.5
          vertical_flip_prob: 0.0
          rotation_degrees: 20
          color_jitter:
            brightness: 0.15
            contrast: 0.15
            saturation: 0.0
            hue: 0.0
        validation:
          resize: 256
          center_crop: 224
        normalization:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
    M4:
      description: Unfreeze end groups 7-8 with stronger augmentation.
      trainable_groups: [7, 8]
      epochs: 8
      batch_size: 16
      learning_rate: 0.00005
      weight_decay: 0.0001
      dropout: 0.5
      augmentation:
        train:
          random_resized_crop:
            scale: [0.8, 1.2]
          horizontal_flip_prob: 0.5
          vertical_flip_prob: 0.5
          rotation_degrees: 30
          color_jitter:
            brightness: 0.2
            contrast: 0.2
            saturation: 0.2
            hue: 0.05
        validation:
          resize: 256
          center_crop: 224
        normalization:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
    M5:
      description: Unfreeze entire backbone with very strong augmentation.
      trainable_groups: [1, 2, 3, 4, 5, 6, 7, 8]
      epochs: 8
      batch_size: 16
      learning_rate: 0.00001
      weight_decay: 0.0001
      dropout: 0.6
      augmentation:
        train:
          random_resized_crop:
            scale: [0.6, 1.4]
          horizontal_flip_prob: 0.5
          vertical_flip_prob: 0.5
          rotation_degrees: 45
          color_jitter:
            brightness: 0.2
            contrast: 0.2
            saturation: 0.2
            hue: 0.1
        validation:
          resize: 256
          center_crop: 224
        normalization:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
  save_every_phase: true
  include_optimizer_state: false

logging:
  level: INFO
  log_to_file: true
  console_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
