# Smoke test config — Phase 1 one epoch only

project:
  name: GreenVision-smoke
  seed: 42
  image_size: 224
  num_classes: 38

paths:
  data_dir: data
  model_dir: models
  checkpoint_best: models/best_model_smoke.pth
  checkpoint_phase1: models/phase1_best_smoke.pth
  checkpoint_phase2: models/phase2_best_smoke.pth
  class_to_idx: models/class_to_idx.json
  idx_to_class: models/idx_to_class.json
  logs_dir: logs
  mlflow_artifacts_dir: mlruns

mlflow:
  experiment_name: GreenVision-smoke
  tracking_uri: null
  ui_port: 5000

model:
  backbone: efficientnet_b0
  pretrained: true
  feature_dim: 1280
  hidden_dim: 128
  dropout: 0.5

augmentation:
  train:
    random_resized_crop:
      scale: [0.8, 1.0]
    horizontal_flip_prob: 0.5
    vertical_flip_prob: 0.0
    rotation_degrees: 10
    color_jitter:
      brightness: 0.05
      contrast: 0.05
      saturation: 0.05
      hue: 0.02
  validation:
    resize: 256
    center_crop: 224
  normalization:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

splits:
  train: 0.75
  validation: 0.15
  test: 0.10
  validation_images: true

training:
  batch_size: 16
  num_workers: 0
  pin_memory: false
  phase1:
    epochs: 1
    learning_rate: 0.001
    weight_decay: 0.0001
    freeze_backbone: true
  phase2:
    epochs: 0
    learning_rate: 0.0001
    weight_decay: 0.0001
    unfreeze_backbone: false
  regularization:
    dropout: 0.5
    weight_decay: 0.0001
    early_stopping_patience: 2
    early_stopping_min_delta: 0.0
  optimization:
    optimizer: adam
    scheduler: reduce_on_plateau
    scheduler_patience: 3
    scheduler_factor: 0.5

validation:
  batch_size: 16
  num_workers: 0
  pin_memory: false
  save_confusion_matrix: false
  evaluate_each_phase: false

checkpointing:
  monitor: val_loss
  mode: min
  save_best_only: true

logging:
  level: INFO
  log_to_file: true
  console_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
